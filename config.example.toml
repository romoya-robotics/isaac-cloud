[tensordock]
api_token = "td_your_api_token"
public_ssh_key_path = "/home/you/.ssh/id_ed25519.pub"

[ngc]
api_key = "nvapi-your-ngc-api-key"

[ssh]
private_key_path = "/home/you/.ssh/id_ed25519"
user = "user"

[defaults]
# gpu_class = "rtx4080"
# region = "seattle"
# vcpu = 0
# ram_gb = 0
# storage_gb = 0
instance_name_prefix = "isaac-cloud"
isaac_version = "5.1.0"

[viewer]
enabled = false
port = 8210

[mcp]
enabled = false
repo_url = "https://github.com/romoya-robotics/isaac-sim-mcp"
extension_port = 8766

[persistence]
enabled = false
provider = "s3"
auto_pull_on_launch = true
auto_push_on_destroy = true

[aws]
s3_uri = "s3://romoya-isaac/dev/projects/warehouse-sim/default/"
region = "us-west-2"
